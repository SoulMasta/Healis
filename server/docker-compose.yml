version: "3"

services:

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: healis
      POSTGRES_PASSWORD: password
      POSTGRES_DB: healis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: backend
    depends_on:
      - postgres
    environment:
      DB_USER: healis
      DB_PASSWORD: password
      DB_NAME: healis
      DB_HOST: postgres
    ports:
      - "5000:5000"
    command: sh -c "sleep 5 && npm start"

volumes:
  postgres_data:
